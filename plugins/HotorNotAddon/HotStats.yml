name: Hot or Not Match History Add-on
description: Formats Hot or Not Match history info and adds streaks.
version: "1.2"
url: https://discourse.stashapp.cc/t/hotornot-match-history-add-on/5701
exec:
  - python
  - "{pluginDir}/HotOrNotwipe.py"
ui:
  css:
    - hotstatcs.css
  javascript:
    - HotorNotStatsDisplay.js

interface: raw


tasks:
  - name: "Wipe Custom Fields"
    description: Deletes all Performer Custom Fields. 
    defaultArgs:
      mode: processAll